<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weight Tracker GitHub Only</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--blue:#2563eb;--orange:#f97316;--green:#16a34a;--violet:#7c3aed;--border:#e2e8f0}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Arial,'Noto Sans Thai',sans-serif;color:var(--text)}.wrap{max-width:1200px;margin:0 auto;padding:22px}.top{display:flex;gap:14px;justify-content:space-between;align-items:flex-end;flex-wrap:wrap}h1{font-size:32px;margin:0}.muted{color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin:14px 0}.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:0 6px 20px rgba(15,23,42,.06)}.stat .num{font-size:28px;font-weight:800;margin:4px 0}.green{color:#15803d}.violet{color:var(--violet)}.blue{color:var(--blue)}.form{display:grid;grid-template-columns:1fr 1fr auto auto;gap:10px;align-items:end}.settings{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:8px;align-items:end}.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}input,button{font:inherit;border-radius:14px;border:1px solid #cbd5e1;padding:10px 12px;background:#fff}button{cursor:pointer}button.primary{background:var(--blue);color:#fff;border-color:var(--blue)}button.danger{color:#991b1b}.chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.chip{border-radius:999px}.chip.active{background:var(--blue);color:#fff;border-color:var(--blue)}.toggles{display:flex;gap:16px;flex-wrap:wrap;margin:10px 0}.copybox{display:flex;justify-content:space-between;gap:10px;align-items:center;background:#f1f5f9;border-radius:16px;padding:12px;margin-top:10px}.copybox pre{margin:0;white-space:pre-wrap}.chartbox{height:560px}.msg{color:#1d4ed8;margin-top:8px}.warn{font-size:13px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;border-radius:14px;padding:10px;margin-top:10px}@media(max-width:900px){.settings,.form{grid-template-columns:1fr}.chartbox{height:470px}h1{font-size:26px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top"><div><h1>กราฟแนวโน้มน้ำหนัก</h1><div id="subtitle" class="muted">กำลังโหลดข้อมูล...</div></div><div><button onclick="loadFromGithub()">รีเฟรชจาก GitHub</button></div></div>
  <div class="warn"><b>GitHub-only mode:</b> หน้าเว็บนี้อ่าน/เขียนไฟล์ <code>data.json</code> ใน GitHub repo ผ่าน GitHub Contents API ต้องใส่ token ที่มีสิทธิ์เขียน repo</div>
  <div class="card"><div class="settings"><div class="field"><label>Owner</label><input id="ownerInput" placeholder="username" /></div><div class="field"><label>Repo</label><input id="repoInput" placeholder="weight-tracker" /></div><div class="field"><label>Branch</label><input id="branchInput" value="main" /></div><div class="field"><label>Token</label><input id="tokenInput" type="password" placeholder="github_pat_..." /></div><button onclick="saveSettings()">บันทึกค่า</button></div><div class="msg" id="settingsMsg"></div></div>
  <div class="grid"><div class="card stat"><div class="muted">จุดต่ำสุด</div><div id="lowest" class="num green">-</div><div id="lowestDate">-</div></div><div class="card stat"><div class="muted">ก่อนล่าสุด 1 วัน</div><div id="previous" class="num violet">-</div><div id="previousDate">-</div></div><div class="card stat"><div class="muted">ล่าสุด</div><div id="latest" class="num blue">-</div><div id="latestDate">-</div></div></div>
  <div class="card"><div class="form"><div class="field"><label>วันที่ เช่น 27 พ.ค.</label><input id="dateInput" placeholder="27 พ.ค." /></div><div class="field"><label>น้ำหนัก (กก.) เช่น 88.20</label><input id="weightInput" inputmode="decimal" placeholder="88.20" /></div><button class="primary" onclick="addOrUpdate()">เพิ่ม/อัปเดต</button><button class="danger" onclick="deleteLatest()">ลบล่าสุด</button></div><div class="copybox"><pre id="nextText">ส่งต่อได้เลยครับพรุ่งนี้เช้า:\n27 พ.ค. =</pre><button onclick="copyNextText()">คัดลอก</button></div><div id="message" class="msg"></div></div>
  <div class="card"><div class="chips"><button class="chip active" data-range="all" onclick="setRange('all')">ทั้งหมด</button><button class="chip" data-range="30" onclick="setRange('30')">30 จุดล่าสุด</button><button class="chip" data-range="14" onclick="setRange('14')">14 จุดล่าสุด</button><button class="chip" data-range="7" onclick="setRange('7')">7 จุดล่าสุด</button></div><div class="toggles"><label><input type="checkbox" id="showDaily" checked onchange="renderChart()"> น้ำหนักรายวัน</label><label><input type="checkbox" id="showMA7" checked onchange="renderChart()"> เฉลี่ย 7 วัน</label><label><input type="checkbox" id="showMA14" checked onchange="renderChart()"> เฉลี่ย 14 วัน</label></div><div class="chartbox"><canvas id="chart"></canvas></div></div>
</div>
<script src="app.js"></script>
</body>
</html>
